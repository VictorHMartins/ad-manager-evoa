<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TV Player</title>
  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }

    /* Overlay de mensagens de status (erros, sem mídia, etc.) */
    #mensagem {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      font-family: sans-serif;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 999;
    }

    #msg-titulo {
      font-size: 1.1em;
      margin: 0 0 8px 0;
    }

    #msg-subtitulo {
      font-size: 0.8em;
      color: #666;
      margin: 0;
    }

    /* Orientação vertical: rotaciona o conteúdo para TVs em modo landscape
       exibindo conteúdo portrait. Aplicado via JS quando orientacao === "v". */
    body.tv-vertical #conteudo {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 100vh;
      height: 100vw;
      transform: translate(-50%, -50%) rotate(-90deg);
    }
  </style>
</head>

<body>

  <div id="mensagem">
    <div>
      <p id="msg-titulo"></p>
      <p id="msg-subtitulo"></p>
    </div>
  </div>

  <div id="conteudo" style="width:100vw;height:100vh;position:relative;">
    <video id="video" muted playsinline style="width:100%;height:100%;object-fit:cover;display:none;position:absolute;top:0;left:0;"></video>
    <img id="image" style="width:100%;height:100%;object-fit:cover;display:none;position:absolute;top:0;left:0;" />
  </div>

  <script>

    var API_URL = "https://ad-manager-evoa-ad-manager-back.t16vcz.easypanel.host"

    // Leitura ES5 da query string — sem URLSearchParams (máxima compatibilidade)
    function lerQueryParam(nome) {
      var busca = window.location.search
      if (!busca) return ''
      var pares = busca.substring(1).split('&')
      for (var i = 0; i < pares.length; i++) {
        var partes = pares[i].split('=')
        if (partes[0] === nome) {
          return partes.length > 1 ? decodeURIComponent(partes[1]) : ''
        }
      }
      return ''
    }

    var tvCode = lerQueryParam('tv')

    // Exibe mensagem de status na tela — substitui tela preta silenciosa
    function mostrarMensagem(titulo, subtitulo) {
      document.getElementById('msg-titulo').innerHTML = titulo
      document.getElementById('msg-subtitulo').innerHTML = subtitulo || ''
      document.getElementById('mensagem').style.display = 'flex'
    }

    function esconderMensagem() {
      document.getElementById('mensagem').style.display = 'none'
    }

    var midias = []
    var novaMidia = null
    var index = 0
    var timer = null

    var ultimaAtualizacao = 0
    var intervaloAtualizacao = 60000

    var video = document.getElementById("video")
    var image = document.getElementById("image")

    function limparTimer() {
      if (timer) {
        clearTimeout(timer)
        timer = null
      }
    }

    function aplicarOrientacao(orientacao) {
      if (orientacao === 'v') {
        document.body.classList.add('tv-vertical')
      } else {
        document.body.classList.remove('tv-vertical')
      }
    }

    function carregar() {

      if (!tvCode) {
        mostrarMensagem('Código de TV não informado', 'Acesse: /tv.html?tv=CODIGO')
        return
      }

      var xhr = new XMLHttpRequest()

      xhr.open("GET", API_URL + "/api/player/" + tvCode + "/", true)

      xhr.onreadystatechange = function () {

        if (xhr.readyState === 4) {

          if (xhr.status === 200) {

            try {
              var data = JSON.parse(xhr.responseText)

              // Aplica orientação sempre que receber resposta do servidor
              if (data.orientacao) {
                aplicarOrientacao(data.orientacao)
              }

              if (data.midias && data.midias.length > 0) {

                esconderMensagem()

                if (midias.length === 0) {

                  midias = data.midias
                  index = 0
                  rodar()

                } else {

                  var atual = JSON.stringify(midias)
                  var nova = JSON.stringify(data.midias)

                  if (atual !== nova) {
                    novaMidia = data.midias
                  }

                }

                ultimaAtualizacao = new Date().getTime()

              } else {
                mostrarMensagem('Nenhuma mídia disponível', 'Nenhuma fila ativa para este horário')
                setTimeout(carregar, 5000)
              }

            } catch (e) {
              mostrarMensagem('Erro ao processar resposta', 'Tentando novamente...')
              setTimeout(carregar, 5000)
            }

          } else if (xhr.status === 404) {
            mostrarMensagem('TV não encontrada', 'Código: ' + tvCode)
            setTimeout(carregar, 30000)

          } else {
            mostrarMensagem('Erro ao conectar com o servidor', 'Tentando reconectar...')
            setTimeout(carregar, 5000)
          }
        }
      }

      xhr.onerror = function () {
        mostrarMensagem('Sem conexão com o servidor', 'Verificando conexão...')
        setTimeout(carregar, 5000)
      }

      xhr.send()
    }

    function verificarAtualizacao() {
      var agora = new Date().getTime()

      if (agora - ultimaAtualizacao > intervaloAtualizacao) {
        carregar()
      }
    }

    function aplicarAtualizacaoSeNecessario(proximoIndex) {
      if (novaMidia && proximoIndex === 0) {
        midias = novaMidia
        novaMidia = null
        return true
      }
      return false
    }

    function rodar() {

      limparTimer()

      if (!midias.length) {
        mostrarMensagem('Nenhuma mídia disponível', '')
        timer = setTimeout(carregar, 5000)
        return
      }

      var m = midias[index]

      if (m.tipo === "video") {

        image.style.display = "none"
        video.style.display = "block"

        // Reset completo do buffer — necessário para TVs que corrompem
        // o estado interno do elemento <video> entre reproduções
        video.pause()
        video.removeAttribute("src")
        video.load()

        video.src = API_URL + m.arquivo
        video.load()

        var playPromise = video.play()

        if (playPromise !== undefined) {
          playPromise.catch(function () {
            video.muted = true
            video.play()
          })
        }

        video.onended = function () {
          next()
        }

        video.onerror = function () {
          next()
        }

        // Timeout de segurança: avança após 60s se o vídeo não terminar
        timer = setTimeout(next, 60000)

      } else {

        video.pause()
        video.style.display = "none"

        image.style.display = "block"
        image.src = API_URL + m.arquivo

        var tempo = (m.duracao || 10) * 1000

        timer = setTimeout(next, tempo)
      }
    }

    function next() {
      limparTimer()

      var proximoIndex = (index + 1) % midias.length

      verificarAtualizacao()

      var atualizou = aplicarAtualizacaoSeNecessario(proximoIndex)

      if (atualizou) {
        index = 0
      } else {
        index = proximoIndex
      }

      rodar()
    }

    carregar()

  </script>

</body>
</html>
