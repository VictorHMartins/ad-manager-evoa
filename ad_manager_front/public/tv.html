<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TV Player</title>
</head>

<body style="margin:0;background:black;overflow:hidden;">

  <video id="video" muted playsinline style="width:100vw;height:100vh;object-fit:cover;display:none;"></video>
  <img id="image" style="width:100vw;height:100vh;object-fit:cover;display:none;" />

  <script>

    var API_URL = "https://ad-manager-evoa-ad-manager-back.t16vcz.easypanel.host"

    var midias = []
    var novaMidia = null
    var index = 0
    var timer = null

    var ultimaAtualizacao = 0
    var intervaloAtualizacao = 60000

    var video = document.getElementById("video")
    var image = document.getElementById("image")

    function limparTimer() {
      if (timer) {
        clearTimeout(timer)
        timer = null
      }
    }

    function carregar() {

      var xhr = new XMLHttpRequest()

      xhr.open("GET", API_URL + "/api/player/", true)

      xhr.onreadystatechange = function () {

        if (xhr.readyState === 4) {

          if (xhr.status === 200) {

            try {
              var data = JSON.parse(xhr.responseText)

              var atual = JSON.stringify(midias)
              var nova = JSON.stringify(data.midias || [])

              if (atual !== nova) {
                novaMidia = data.midias || []
              }

              ultimaAtualizacao = new Date().getTime()

            } catch (e) {
              setTimeout(carregar, 5000)
            }

          } else {
            setTimeout(carregar, 5000)
          }
        }
      }

      xhr.onerror = function () {
        setTimeout(carregar, 5000)
      }

      xhr.send()
    }

    function verificarAtualizacao() {
      var agora = new Date().getTime()

      if (agora - ultimaAtualizacao > intervaloAtualizacao) {
        carregar()
      }
    }

    function aplicarAtualizacaoSeNecessario(proximoIndex) {
      if (novaMidia && proximoIndex === 0) {
        midias = novaMidia
        novaMidia = null
        return true
      }
      return false
    }

    function rodar() {

      limparTimer()

      if (!midias.length) {
        timer = setTimeout(carregar, 5000)
        return
      }

      var m = midias[index]

      if (m.tipo === "video") {

        image.style.display = "none"

        video.style.display = "block"

        video.pause()
        video.removeAttribute("src")
        video.load()

        video.src = API_URL + m.arquivo

        video.load()

        var playPromise = video.play()

        if (playPromise !== undefined) {
          playPromise.catch(function () {
            video.muted = true
            video.play()
          })
        }

        video.onended = function () {
          next()
        }

        video.onerror = function () {
          next()
        }

        timer = setTimeout(next, 60000)

      } else {

        video.pause()
        video.style.display = "none"

        image.style.display = "block"
        image.src = API_URL + m.arquivo

        var tempo = (m.duracao || 10) * 1000

        timer = setTimeout(next, tempo)
      }
    }

    function next() {
      limparTimer()

      var proximoIndex = (index + 1) % midias.length

      verificarAtualizacao()

      var atualizou = aplicarAtualizacaoSeNecessario(proximoIndex)

      if (atualizou) {
        index = 0
      } else {
        index = proximoIndex
      }

      rodar()
    }

    carregar()

  </script>

</body>
</html>
