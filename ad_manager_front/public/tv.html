<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TV Player</title>
</head>

<body style="margin:0;background:black;overflow:hidden;">

  <video id="video" autoplay muted playsinline style="width:100vw;height:100vh;object-fit:cover;display:none;"></video>
  <img id="image" style="width:100vw;height:100vh;object-fit:cover;display:none;" />

  <script>

    var API_URL = "https://ad-manager-evoa-ad-manager-back.t16vcz.easypanel.host"

    var midias = []
    var index = 0
    var timer = null

    var ultimaAtualizacao = 0
    var intervaloAtualizacao = 60000

    function limparTimer() {
      if (timer) {
        clearTimeout(timer)
        timer = null
      }
    }

    function carregar() {

      var xhr = new XMLHttpRequest()

      xhr.open("GET", API_URL + "/api/player/", true)

      xhr.onreadystatechange = function () {

        if (xhr.readyState === 4) {

          if (xhr.status === 200) {

            try {
              var data = JSON.parse(xhr.responseText)

              midias = data.midias || []
              index = 0
              ultimaAtualizacao = new Date().getTime()

              rodar()

            } catch (e) {
              setTimeout(carregar, 5000)
            }

          } else {
            setTimeout(carregar, 5000)
          }
        }
      }

      xhr.onerror = function () {
        setTimeout(carregar, 5000)
      }

      xhr.send()
    }

    function verificarAtualizacao() {
      var agora = new Date().getTime()

      if (agora - ultimaAtualizacao > intervaloAtualizacao) {
        carregar()
      }
    }

    function rodar() {

      limparTimer()

      if (!midias.length) {
        timer = setTimeout(carregar, 5000)
        return
      }

      var m = midias[index]

      var image = document.getElementById("image")

      if (m.tipo === "video") {

        image.style.display = "none"

        var container = document.body

        var videoAntigo = document.getElementById("video")

        if (videoAntigo) {
          videoAntigo.parentNode.removeChild(videoAntigo)
        }

        var video = document.createElement("video")

        video.id = "video"
        video.autoplay = true
        video.muted = true
        video.setAttribute("playsinline", "")

        video.style.width = "100vw"
        video.style.height = "100vh"
        video.style.objectFit = "cover"

        container.appendChild(video)

        video.src = API_URL + m.arquivo

        var playPromise = video.play()

        if (playPromise !== undefined) {
          playPromise.catch(function () {
            video.muted = true
            video.play()
          })
        }

        video.onended = function () {
          next()
        }

        timer = setTimeout(next, 60000)

      } else {

        var videoAtual = document.getElementById("video")

        if (videoAtual) {
          videoAtual.pause()
          videoAtual.style.display = "none"
        }

        image.style.display = "block"
        image.src = API_URL + m.arquivo

        var tempo = (m.duracao || 10) * 1000

        timer = setTimeout(next, tempo)
      }
    }

    function next() {
      limparTimer()
      index = (index + 1) % midias.length
      verificarAtualizacao()
      rodar()
    }

    carregar()

  </script>

</body>
</html>
